apiVersion: aatb.or-infra.com/v1
kind: SystemSpec
metadata:
  name: test-agent-06
  description: "Test agent — end-to-end provision via apply-system-spec.yml (ADR-0013)"
spec:
  gcp:
    projectId: or-test-agent-06
    region: us-central1
  github:
    repo: edri2or/test-agent-06
    fromTemplate: edri2or/autonomous-agent-template-builder
  railway:
    services:
      - name: agent
        kind: typescript
        rootDir: src/agent
      - name: n8n
        kind: docker
        image: n8nio/n8n
  cloudflare:
    zone: test-agent-06.or-infra.com
    worker:
      name: test-agent-06-edge
      route: test-agent-06.or-infra.com/*
  secrets:
    required:
      - openrouter-runtime-key
      - telegram-bot-token
  intent:
    source: "create a test system from the template — full autonomous provision flow via apply-system-spec.yml"
