apiVersion: aatb.or-infra.com/v1
kind: SystemSpec
metadata:
  name: test-agent-07c
  description: "Test agent 07c — full DAG proof after all 8 friction-point fixes (PRs #113-#122)"
spec:
  gcp:
    projectId: or-test-agent-07c
    region: us-central1
  github:
    repo: edri2or/test-agent-07c
    fromTemplate: edri2or/autonomous-agent-template-builder
  railway:
    services:
      - name: agent
        kind: typescript
        rootDir: src/agent
      - name: n8n
        kind: docker
        image: n8nio/n8n
  cloudflare:
    zone: test-agent-07c.or-infra.com
    worker:
      name: test-agent-07c-edge
      route: test-agent-07c.or-infra.com/*
  secrets:
    required:
      - openrouter-runtime-key
      - telegram-bot-token
  intent:
    source: "prove full DAG first-attempt success: provision-clone + provision-providers + activate-clone"
