apiVersion: aatb.or-infra.com/v1
kind: SystemSpec
metadata:
  name: test-agent-07g
  description: "Test agent 07g — prove bootstrap Phase 4 GitHub App registration after Issue 10 fix"
spec:
  gcp:
    projectId: or-test-agent-07g
    region: us-central1
  github:
    repo: edri2or/test-agent-07g
    fromTemplate: edri2or/autonomous-agent-template-builder
  railway:
    services:
      - name: agent
        kind: typescript
        rootDir: src/agent
      - name: n8n
        kind: docker
        image: n8nio/n8n
  cloudflare:
    zone: test-agent-07g.or-infra.com
    worker:
      name: test-agent-07g-edge
      route: test-agent-07g.or-infra.com/*
  secrets:
    required:
      - openrouter-runtime-key
      - telegram-bot-token
  intent:
    source: "prove bootstrap Phase 4 GitHub App registration after Issue 10 fix"
