apiVersion: aatb.or-infra.com/v1
kind: SystemSpec
metadata:
  name: test-agent-07
  description: "Test agent — proves first-attempt provision success after token-scope fix"
spec:
  gcp:
    projectId: or-test-agent-07
    region: us-central1
  github:
    repo: edri2or/test-agent-07
    fromTemplate: edri2or/autonomous-agent-template-builder
  railway:
    services:
      - name: agent
        kind: typescript
        rootDir: src/agent
      - name: n8n
        kind: docker
        image: n8nio/n8n
  cloudflare:
    zone: test-agent-07.or-infra.com
    worker:
      name: test-agent-07-edge
      route: test-agent-07.or-infra.com/*
  secrets:
    required:
      - openrouter-runtime-key
      - telegram-bot-token
  intent:
    source: "prove first-attempt provision success after GitHub App token scope fix"
