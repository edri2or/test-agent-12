apiVersion: aatb.or-infra.com/v1
kind: SystemSpec
metadata:
  name: test-agent-07a
  description: "Test agent 07a — proves first-attempt success after GCP IAM propagation fix"
spec:
  gcp:
    projectId: or-test-agent-07a
    region: us-central1
  github:
    repo: edri2or/test-agent-07a
    fromTemplate: edri2or/autonomous-agent-template-builder
  railway:
    services:
      - name: agent
        kind: typescript
        rootDir: src/agent
      - name: n8n
        kind: docker
        image: n8nio/n8n
  cloudflare:
    zone: test-agent-07a.or-infra.com
    worker:
      name: test-agent-07a-edge
      route: test-agent-07a.or-infra.com/*
  secrets:
    required:
      - openrouter-runtime-key
      - telegram-bot-token
  intent:
    source: "prove first-attempt success after GCP IAM propagation fix (sleep 20 + billing retry)"
