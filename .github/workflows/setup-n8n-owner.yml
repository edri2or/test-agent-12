name: Setup N8N Owner

# Idempotent: configures the n8n owner account via the setup wizard API
# (POST /rest/owner/setup).
#
# Run this whenever n8n is in "setup wizard" mode (no owner configured).
# Safe to re-run: skips the setup API call if login already works.
#
# NOTE: The following Railway vars are intentionally NOT set and are deleted
# if previously present, as each causes n8n to crash on startup:
#   N8N_INSTANCE_OWNER_MANAGED_BY_ENV + N8N_INSTANCE_OWNER_PASSWORD_HASH:
#     Python bcrypt produces $2b$ prefix; n8n's bcryptjs doesn't accept it.
#   DB_TYPE + DATABASE_URL: Railway reference variable ${{Postgres.DATABASE_URL}}
#     crashes n8n when Postgres isn't in the same Railway environment.
# The owner is configured once via the wizard API and persists in SQLite
# until the next Railway redeploy.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: Configure N8N owner account
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      N8N_OWNER_EMAIL: ${{ vars.N8N_OWNER_EMAIL || 'ops@example.com' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets from GCP Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            railway-api-token:${{ vars.GCP_PROJECT_ID }}/railway-api-token
            railway-project-id:${{ vars.GCP_PROJECT_ID }}/railway-project-id
            railway-environment-id:${{ vars.GCP_PROJECT_ID }}/railway-environment-id
            n8n-admin-password-plaintext:${{ vars.GCP_PROJECT_ID }}/n8n-admin-password-plaintext

      - name: Export Railway project/environment IDs to env
        run: |
          echo "RAILWAY_PROJECT_ID=${{ steps.secrets.outputs.railway-project-id }}" >> "$GITHUB_ENV"
          echo "RAILWAY_ENVIRONMENT_ID=${{ steps.secrets.outputs.railway-environment-id }}" >> "$GITHUB_ENV"

      - name: Resolve N8N Railway service domain + service ID
        id: domain
        env:
          RAILWAY_TOKEN: ${{ steps.secrets.outputs.railway-api-token }}
        run: |
          RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "User-Agent: autonomous-agent-template-builder/1.0 (+setup-n8n-owner.yml)" \
            -d "$(jq -cn --arg pid "$RAILWAY_PROJECT_ID" \
              '{"query":"query($pid:String!){project(id:$pid){services{edges{node{id name}}}}}","variables":{"pid":$pid}}')")

          N8N_SVC_ID=$(echo "$RESP" | jq -r \
            '[.data.project.services.edges[] | select(.node.name == "n8n")] | first | .node.id // empty')
          [ -n "$N8N_SVC_ID" ] || { echo "::error::N8N service not found in Railway project"; exit 1; }

          DOMAINS_RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "User-Agent: autonomous-agent-template-builder/1.0 (+setup-n8n-owner.yml)" \
            -d "$(jq -cn --arg sid "$N8N_SVC_ID" --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              '{"query":"query($sid:String!,$eid:String!){serviceInstance(serviceId:$sid,environmentId:$eid){domains{serviceDomains{id domain}}}}","variables":{"sid":$sid,"eid":$eid}}')")

          N8N_DOMAIN=$(echo "$DOMAINS_RESP" | jq -r \
            '(.data.serviceInstance.domains.serviceDomains // []) | .[0].domain // empty')
          [ -n "$N8N_DOMAIN" ] || { echo "::error::N8N Railway service domain not found"; exit 1; }

          echo "N8N domain: $N8N_DOMAIN"
          echo "n8n_domain=$N8N_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "n8n_svc_id=$N8N_SVC_ID" >> "$GITHUB_OUTPUT"

      - name: Remove crashing vars from Railway n8n service (if present)
        env:
          RAILWAY_TOKEN: ${{ steps.secrets.outputs.railway-api-token }}
          N8N_SVC_ID: ${{ steps.domain.outputs.n8n_svc_id }}
        run: |
          GQL="https://backboard.railway.app/graphql/v2"
          HDRS=(-H "Authorization: Bearer $RAILWAY_TOKEN" -H "Content-Type: application/json" -H "Accept: application/json" -H "User-Agent: autonomous-agent-template-builder/1.0 (+setup-n8n-owner.yml)")
          for VAR_NAME in N8N_INSTANCE_OWNER_MANAGED_BY_ENV N8N_INSTANCE_OWNER_PASSWORD_HASH DB_TYPE DATABASE_URL; do
            RESP=$(curl -s -X POST "$GQL" "${HDRS[@]}" \
              -d "$(jq -cn \
                --arg pid "$RAILWAY_PROJECT_ID" \
                --arg eid "$RAILWAY_ENVIRONMENT_ID" \
                --arg sid "$N8N_SVC_ID" \
                --arg name "$VAR_NAME" \
                '{"query":"mutation($i:VariableDeleteInput!){variableDelete(input:$i)}","variables":{"i":{"projectId":$pid,"environmentId":$eid,"serviceId":$sid,"name":$name}}}')")
            echo "Delete $VAR_NAME: $(echo "$RESP" | jq -c '{data:.data,errors:.errors}')"
          done
          echo "Crashing vars removed."

          # N8N_HOST=0.0.0.0 allows n8n to accept requests from any Host header.
          # Without it, n8n rejects all non-localhost requests with "Host not in allowlist".
          UPSERT_RESP=$(curl -s -X POST "$GQL" "${HDRS[@]}" \
            -d "$(jq -cn \
              --arg pid "$RAILWAY_PROJECT_ID" \
              --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              --arg sid "$N8N_SVC_ID" \
              '{"query":"mutation($i:VariableCollectionUpsertInput!){variableCollectionUpsert(input:$i)}","variables":{"i":{"projectId":$pid,"environmentId":$eid,"serviceId":$sid,"variables":{"N8N_HOST":"0.0.0.0"}}}}')")
          echo "Set N8N_HOST: $(echo "$UPSERT_RESP" | jq -c '{data:.data,errors:.errors}')"

          # Force a fresh redeploy — Railway may have stopped n8n after max
          # crash-loop retries, in which case var deletion alone won't restart it.
          REDEPLOY=$(curl -s -X POST "$GQL" "${HDRS[@]}" \
            -d "$(jq -cn \
              --arg sid "$N8N_SVC_ID" \
              --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              '{"query":"mutation($sid:String!,$eid:String!){serviceInstanceRedeploy(serviceId:$sid,environmentId:$eid)}","variables":{"sid":$sid,"eid":$eid}}')")
          echo "Redeploy response: $(echo "$REDEPLOY" | jq -c '{data:.data,errors:.errors}')"

      - name: Wait for N8N to be healthy
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
        run: |
          CHECK_URL="https://$N8N_DOMAIN/healthz"
          echo "Health check: $CHECK_URL"
          for attempt in $(seq 1 40); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$CHECK_URL" 2>/dev/null)
            echo "Attempt $attempt/40: HTTP $HTTP"
            # 403 = running but awaiting owner setup; both are acceptable
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "403" ]; then
              echo "N8N is up (HTTP $HTTP)."; break
            fi
            [ "$attempt" = "40" ] && { echo "::error::N8N health check failed after 40 attempts"; exit 1; }
            sleep 15
          done

      - name: Check if owner already configured (try login)
        id: check_owner
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          N8N_PW: ${{ steps.secrets.outputs.n8n-admin-password-plaintext }}
        run: |
          BASE_URL="https://$N8N_DOMAIN"
          LOGIN_RESP=$(curl -s -c /tmp/n8n_cookies.txt \
            -X POST "$BASE_URL/rest/login" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg email "$N8N_OWNER_EMAIL" \
              --arg pw "$N8N_PW" \
              '{"emailOrLdapLoginId":$email,"password":$pw}')")
          USER_ID=$(echo "$LOGIN_RESP" | jq -r '.data.id // empty')
          if [ -n "$USER_ID" ]; then
            echo "Owner already configured (user id: $USER_ID) — skipping setup wizard step."
            echo "already_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "No owner configured (login failed) — will call setup wizard API."
            echo "already_configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure owner via setup wizard API
        if: steps.check_owner.outputs.already_configured == 'false'
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          N8N_PW: ${{ steps.secrets.outputs.n8n-admin-password-plaintext }}
        run: |
          BASE_URL="https://$N8N_DOMAIN"
          SETUP_RESP=$(curl -s \
            -X POST "$BASE_URL/rest/owner/setup" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg email "$N8N_OWNER_EMAIL" \
              --arg pw "$N8N_PW" \
              '{"email":$email,"firstName":"Instance","lastName":"Owner","password":$pw}')")
          USER_ID=$(echo "$SETUP_RESP" | jq -r '.data.id // empty')
          [ -n "$USER_ID" ] || {
            echo "::error::Setup wizard API failed: $(echo "$SETUP_RESP" | jq -c '{code:.code,message:.message}')"
            echo "Full response: $SETUP_RESP"
            exit 1
          }
          echo "Owner account created (user id: $USER_ID)."

      - name: Verify login works
        id: verify
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          N8N_PW: ${{ steps.secrets.outputs.n8n-admin-password-plaintext }}
        run: |
          BASE_URL="https://$N8N_DOMAIN"
          LOGIN_RESP=$(curl -s -c /tmp/n8n_cookies.txt \
            -X POST "$BASE_URL/rest/login" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg email "$N8N_OWNER_EMAIL" \
              --arg pw "$N8N_PW" \
              '{"emailOrLdapLoginId":$email,"password":$pw}')")
          USER_ID=$(echo "$LOGIN_RESP" | jq -r '.data.id // empty')
          [ -n "$USER_ID" ] || {
            echo "::error::Login verification failed after setup: $(echo "$LOGIN_RESP" | jq -c '{code:.code,message:.message}')"
            exit 1
          }
          echo "Login verified (user id: $USER_ID)."
          echo "user_id=$USER_ID" >> "$GITHUB_OUTPUT"

      - name: Summary
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          ALREADY_CONFIGURED: ${{ steps.check_owner.outputs.already_configured }}
          USER_ID: ${{ steps.verify.outputs.user_id }}
        run: |
          {
            echo "## N8N Owner Setup Complete"
            echo ""
            echo "| Resource | Detail | Status |"
            echo "|----------|--------|--------|"
            echo "| N8N instance | \`$N8N_DOMAIN\` | ✅ Healthy |"
            echo "| Owner account | \`$N8N_OWNER_EMAIL\` (id: \`$USER_ID\`) | ✅ Configured |"
            if [ "$ALREADY_CONFIGURED" = "true" ]; then
              echo "| Setup wizard | Already configured — skipped | ✅ |"
            else
              echo "| Setup wizard | Called \`POST /rest/owner/setup\` | ✅ |"
            fi
            echo ""
            echo "**Next step:** Run \`configure-n8n-openrouter.yml\` (Stage 4)."
          } >> "$GITHUB_STEP_SUMMARY"
