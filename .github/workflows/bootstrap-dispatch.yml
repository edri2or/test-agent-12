  summary:
    name: Bootstrap summary
    runs-on: ubuntu-latest
    needs: [generate-and-inject-secrets, terraform-apply, inject-railway-variables, github-app-registration, trigger-first-deploy]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch')

