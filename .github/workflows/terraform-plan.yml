name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write   # Required for WIF/OIDC authentication to GCP
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Format, Validate, Plan
    runs-on: ubuntu-latest
    # Skip entirely when GCP credentials are not yet configured (pre-bootstrap)
    if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''

    env:
      TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_gcp_region: ${{ vars.GCP_REGION || 'us-central1' }}
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_github_org: ${{ github.repository_owner }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_terraform_state_bucket: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_clone_slug: ${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Format Check
        id: fmt
        run: terraform -chdir=terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state" \
            -input=false

      - name: Terraform Validate
        id: validate
        run: terraform -chdir=terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=terraform plan \
            -no-color \
            -out=tfplan \
            -var-file=terraform.tfvars.example \
            2>&1 | tee /tmp/plan_output.txt
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.existsSync('/tmp/plan_output.txt')
              ? fs.readFileSync('/tmp/plan_output.txt', 'utf8').slice(-65000)
              : 'Plan output not available.';

            const fmtStatus = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '❌';
            const initStatus = '${{ steps.init.outcome }}' === 'success' ? '✅' : '❌';
            const validateStatus = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            const body = `## Terraform Plan

            | Step | Status |
            |------|--------|
            | Format | ${fmtStatus} |
            | Init | ${initStatus} |
            | Validate | ${validateStatus} |
            | Plan | ${planStatus} |

            <details><summary>Plan Output</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`

            </details>

            > **Note:** \`terraform apply\` requires human operator execution. Claude Code must not run it automatically.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
