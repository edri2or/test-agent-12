name: Probe source-project secrets (autonomy primitive)

# Lists every secret container in the SECRETS_SOURCE_PROJECT (the
# template-builder's GCP project, default = vars.GCP_PROJECT_ID =
# or-infra-templet-admin) so an agent or operator can discover the
# canonical kebab-case name + length + lifecycle metadata WITHOUT
# asking the operator. Designed to be the source-of-truth replacement
# for hand-maintained inventories like docs/bootstrap-state.md (which
# tend to drift).
#
# Triggers:
#   - workflow_dispatch (operator/agent on-demand discovery)
#   - schedule: daily 06:00 UTC (keeps the most recent run fresh in
#     the Actions tab so a session-start agent can `gh run list` it)
#
# Output: per-secret annotations + a step-summary table sorted
# alphabetically. Never logs secret VALUES — only names + the latest
# version's createTime + length (size in bytes). Read-only against GCP.
#
# Optional input:
#   filter — case-insensitive substring filter over secret name
#            (e.g. "linear" → only linear-* secrets).

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'Case-insensitive substring filter (empty = list all)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily

permissions:
  contents: read
  id-token: write

jobs:
  probe:
    name: List source-project secrets
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: List secrets + per-secret latest version metadata
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          FILTER: ${{ inputs.filter }}
        run: |
          set -uo pipefail

          # Fetch all secret containers. Capture stderr → annotation on
          # failure (consistent with probe-billing-projects.yml's pattern).
          if ! NAMES=$(gcloud secrets list --project="$GCP_PROJECT_ID" \
              --format='value(name)' 2>&1); then
            ENC=$(printf '%s' "$NAMES" | tr '\n' '|' | head -c 800)
            echo "::error title=secrets-list-FAIL::$ENC"
            exit 1
          fi
          if [ -z "$NAMES" ]; then
            echo "::error title=probe-fail::secrets list returned empty (project may be wrong)"
            exit 1
          fi

          {
            echo "## Secrets in \`$GCP_PROJECT_ID\`"
            echo ""
            if [ -n "$FILTER" ]; then echo "**Filter:** \`$FILTER\` (case-insensitive)"; echo ""; fi
            echo "| Secret name | Size (bytes) | Created |"
            echo "|-------------|--------------|---------|"
          } >> "$GITHUB_STEP_SUMMARY"

          COUNT=0
          while IFS= read -r NAME; do
            [ -z "$NAME" ] && continue
            # Apply optional filter
            if [ -n "$FILTER" ]; then
              echo "$NAME" | grep -qi -- "$FILTER" || continue
            fi
            COUNT=$((COUNT + 1))
            META=$(gcloud secrets versions list "$NAME" \
              --project="$GCP_PROJECT_ID" \
              --filter='state=ENABLED' \
              --limit=1 \
              --format='value(createTime,size)' 2>/dev/null || echo "?  ?")
            CREATED=$(echo "$META" | awk '{print $1}')
            SIZE=$(echo "$META" | awk '{print $2}')
            echo "| \`$NAME\` | ${SIZE:-?} | ${CREATED:-?} |" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=secret::name=$NAME size=${SIZE:-?} created=${CREATED:-?}"
          done <<< "$NAMES"
          {
            echo ""
            echo "**Total:** $COUNT secret(s)"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=probe-summary::project=$GCP_PROJECT_ID count=$COUNT filter='${FILTER:-(none)}'"
