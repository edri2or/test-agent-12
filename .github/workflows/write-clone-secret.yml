name: Write secret to clone Secret Manager

on:
  workflow_dispatch:
    inputs:
      clone_project_id:
        description: GCP project ID of the clone
        required: true
      secret_name:
        description: Secret name (kebab-case)
        required: true
      secret_value:
        description: Secret value to write
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  write-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write secret
        env:
          CLONE_PROJECT: ${{ inputs.clone_project_id }}
          SECRET_NAME: ${{ inputs.secret_name }}
          SECRET_VALUE: ${{ inputs.secret_value }}
        run: |
          PROJECT="$CLONE_PROJECT"
          NAME="$SECRET_NAME"
          VALUE="$SECRET_VALUE"

          if gcloud secrets describe "$NAME" --project="$PROJECT" >/dev/null 2>&1; then
            echo "Secret exists — adding new version"
          else
            echo "Creating secret $NAME"
            gcloud secrets create "$NAME" --project="$PROJECT" --replication-policy=automatic
          fi

          printf '%s' "$VALUE" | gcloud secrets versions add "$NAME" \
            --project="$PROJECT" --data-file=-

          echo "::notice::Written secret ${NAME} to project ${PROJECT}"
          echo "## Secret written" >> "$GITHUB_STEP_SUMMARY"
          echo "- Project: \`${PROJECT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Secret: \`${NAME}\`" >> "$GITHUB_STEP_SUMMARY"
