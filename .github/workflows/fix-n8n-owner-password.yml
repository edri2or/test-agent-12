name: Fix N8N owner password sync + cleanup API keys

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix:
    name: Sync N8N_OWNER_PASSWORD to GCP SM + delete expired API keys
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      N8N_OWNER_EMAIL: ${{ vars.N8N_OWNER_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets from GCP Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            railway-api-token:${{ vars.GCP_PROJECT_ID }}/railway-api-token
            n8n-admin-password-plaintext:${{ vars.GCP_PROJECT_ID }}/n8n-admin-password-plaintext
            railway-project-id:${{ vars.GCP_PROJECT_ID }}/railway-project-id
            railway-environment-id:${{ vars.GCP_PROJECT_ID }}/railway-environment-id
      - name: Export Railway project/environment IDs to env
        run: |
          echo "RAILWAY_PROJECT_ID=${{ steps.secrets.outputs.railway-project-id }}" >> "$GITHUB_ENV"
          echo "RAILWAY_ENVIRONMENT_ID=${{ steps.secrets.outputs.railway-environment-id }}" >> "$GITHUB_ENV"


      - name: Resolve N8N Railway service ID
        id: domain
        env:
          RAILWAY_TOKEN: ${{ steps.secrets.outputs.railway-api-token }}
        run: |
          RESP=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --arg pid "$RAILWAY_PROJECT_ID" \
              '{"query":"query($pid:String!){project(id:$pid){services{edges{node{id name}}}}}","variables":{"pid":$pid}}')")

          N8N_SVC_ID=$(echo "$RESP" | jq -r \
            '[.data.project.services.edges[] | select(.node.name == "n8n")] | first | .node.id // empty')
          [ -n "$N8N_SVC_ID" ] || { echo "::error::N8N service not found in Railway project"; exit 1; }

          DOMAINS_RESP=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --arg sid "$N8N_SVC_ID" --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              '{"query":"query($sid:String!,$eid:String!){serviceInstance(serviceId:$sid,environmentId:$eid){domains{serviceDomains{id domain}}}}","variables":{"sid":$sid,"eid":$eid}}')")

          N8N_DOMAIN=$(echo "$DOMAINS_RESP" | jq -r \
            '(.data.serviceInstance.domains.serviceDomains // []) | .[0].domain // empty')
          [ -n "$N8N_DOMAIN" ] || { echo "::error::N8N Railway service domain not found"; exit 1; }

          echo "n8n_svc_id=$N8N_SVC_ID" >> "$GITHUB_OUTPUT"
          echo "n8n_domain=$N8N_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "N8N service ID: $N8N_SVC_ID | domain: $N8N_DOMAIN"

      - name: Read actual N8N password from Railway variables
        id: n8n_pw
        env:
          RAILWAY_TOKEN: ${{ steps.secrets.outputs.railway-api-token }}
          N8N_SVC_ID: ${{ steps.domain.outputs.n8n_svc_id }}
        run: |
          VARS=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg sid "$N8N_SVC_ID" \
              --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              --arg pid "$RAILWAY_PROJECT_ID" \
              '{"query":"query($sid:String!,$eid:String!,$pid:String!){variables(serviceId:$sid,environmentId:$eid,projectId:$pid)}","variables":{"sid":$sid,"eid":$eid,"pid":$pid}}')")

          N8N_PW=$(echo "$VARS" | jq -r '.data.variables.N8N_OWNER_PASSWORD_REF // empty')
          [ -n "$N8N_PW" ] || { echo "::error::N8N_OWNER_PASSWORD_REF not found in Railway variables"; exit 1; }

          echo "::add-mask::$N8N_PW"
          echo "n8n_pw=$N8N_PW" >> "$GITHUB_OUTPUT"
          echo "N8N owner password resolved from Railway."

      - name: Sync N8N_OWNER_PASSWORD to GCP Secret Manager (idempotent)
        id: sync
        env:
          N8N_PW: ${{ steps.n8n_pw.outputs.n8n_pw }}
          CURRENT_PW: ${{ steps.secrets.outputs.n8n-admin-password-plaintext }}
        run: |
          if [ "$N8N_PW" = "$CURRENT_PW" ]; then
            echo "GCP SM N8N_OWNER_PASSWORD already matches Railway value — no update needed."
            echo "synced=false" >> "$GITHUB_OUTPUT"
          else
            echo "Updating GCP SM N8N_OWNER_PASSWORD..."

            OLD_VERSION=$(gcloud secrets versions list N8N_OWNER_PASSWORD \
              --project="$GCP_PROJECT_ID" \
              --filter="state=enabled" \
              --sort-by="~createTime" \
              --limit=1 \
              --format="value(name)" | awk -F/ '{print $NF}')

            printf '%s' "$N8N_PW" | gcloud secrets versions add N8N_OWNER_PASSWORD \
              --project="$GCP_PROJECT_ID" \
              --data-file=-

            if [ -n "$OLD_VERSION" ]; then
              gcloud secrets versions disable "$OLD_VERSION" \
                --secret=N8N_OWNER_PASSWORD \
                --project="$GCP_PROJECT_ID"
              echo "Disabled old version: $OLD_VERSION"
            else
              echo "::warning::No enabled version found to disable — skipping"
            fi

            echo "GCP SM updated."
            echo "synced=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for N8N to be healthy
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
        run: |
          CHECK_URL="https://$N8N_DOMAIN/healthz/readiness"
          for attempt in $(seq 1 10); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$CHECK_URL" 2>/dev/null)
            echo "Attempt $attempt/10: HTTP $HTTP"
            [ "$HTTP" = "200" ] && { echo "N8N is healthy."; break; }
            [ "$attempt" = "10" ] && { echo "::error::N8N health check failed after 10 attempts"; exit 1; }
            sleep 15
          done

      - name: Login to N8N
        id: n8n_auth
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          N8N_PW: ${{ steps.n8n_pw.outputs.n8n_pw }}
        run: |
          BASE_URL="https://$N8N_DOMAIN"

          LOGIN_RESP=$(curl -s -c /tmp/n8n_cookies.txt \
            -X POST "$BASE_URL/rest/login" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg email "$N8N_OWNER_EMAIL" \
              --arg pw "$N8N_PW" \
              '{"emailOrLdapLoginId":$email,"password":$pw}')")

          USER_ID=$(echo "$LOGIN_RESP" | jq -r '.data.id // empty')
          [ -n "$USER_ID" ] || { echo "::error::N8N login failed: $(echo "$LOGIN_RESP" | jq -r '.code // .message // .')"; exit 1; }
          echo "Logged in as user $USER_ID"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Delete expired stage4-ci API keys
        id: cleanup
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
        run: |
          KEYS=$(curl -s -b /tmp/n8n_cookies.txt "$BASE_URL/rest/api-keys")
          DELETED=0

          while IFS= read -r KEY_ID; do
            [ -z "$KEY_ID" ] && continue
            curl -s -b /tmp/n8n_cookies.txt \
              -X DELETE "$BASE_URL/rest/api-keys/$KEY_ID" > /dev/null
            echo "Deleted API key: $KEY_ID"
            DELETED=$(( DELETED + 1 ))
          done < <(echo "$KEYS" | jq -r '.data[]? | select(.label == "stage4-ci") | .id // empty')

          echo "deleted_count=$DELETED" >> "$GITHUB_OUTPUT"
          echo "Deleted $DELETED stage4-ci API key(s)."

      - name: Summary
        env:
          SYNCED: ${{ steps.sync.outputs.synced }}
          DELETED: ${{ steps.cleanup.outputs.deleted_count }}
        run: |
          {
            echo "## Fix N8N Owner Password + API Key Cleanup"
            echo ""
            echo "| Action | Result |"
            echo "|--------|--------|"
            if [ "$SYNCED" = "true" ]; then
              echo "| GCP SM \`N8N_OWNER_PASSWORD\` | ✅ Updated (new version added) |"
            else
              echo "| GCP SM \`N8N_OWNER_PASSWORD\` | ✅ Already in sync — no update needed |"
            fi
            echo "| Expired \`stage4-ci\` API keys deleted | \`$DELETED\` keys removed |"
          } >> "$GITHUB_STEP_SUMMARY"
