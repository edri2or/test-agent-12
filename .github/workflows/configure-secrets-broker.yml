name: Stage 6 — Configure N8N Secrets Broker

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  configure:
    name: Deploy Secrets Broker → N8N + E2E gate
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      N8N_OWNER_EMAIL: ${{ vars.N8N_OWNER_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets from GCP Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            railway-api-token:${{ vars.GCP_PROJECT_ID }}/railway-api-token
            n8n-admin-password-plaintext:${{ vars.GCP_PROJECT_ID }}/n8n-admin-password-plaintext
            railway-project-id:${{ vars.GCP_PROJECT_ID }}/railway-project-id
            railway-environment-id:${{ vars.GCP_PROJECT_ID }}/railway-environment-id
            n8n-secrets-broker-token:${{ vars.GCP_PROJECT_ID }}/n8n-secrets-broker-token
            provisioner-app-id:${{ vars.GCP_PROJECT_ID }}/provisioner-app-id
            provisioner-app-private-key:${{ vars.GCP_PROJECT_ID }}/provisioner-app-private-key

      - name: Export Railway project/environment IDs to env
        run: |
          echo "RAILWAY_PROJECT_ID=${{ steps.secrets.outputs.railway-project-id }}" >> "$GITHUB_ENV"
          echo "RAILWAY_ENVIRONMENT_ID=${{ steps.secrets.outputs.railway-environment-id }}" >> "$GITHUB_ENV"

      - name: Generate Provisioner App token (replaces legacy GITHUB_PAT_ACTIONS_WRITE + GITHUB_PAT_SKILL_SYNC)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ steps.secrets.outputs.provisioner-app-id }}
          private-key: ${{ steps.secrets.outputs.provisioner-app-private-key }}
          owner: ${{ github.repository_owner }}

      - name: Resolve N8N Railway service domain
        id: domain
        env:
          RAILWAY_TOKEN: ${{ steps.secrets.outputs.railway-api-token }}
        run: |
          RESP=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --arg pid "$RAILWAY_PROJECT_ID" \
              '{"query":"query($pid:String!){project(id:$pid){services{edges{node{id name}}}}}","variables":{"pid":$pid}}')")

          N8N_SVC_ID=$(echo "$RESP" | jq -r \
            '[.data.project.services.edges[] | select(.node.name == "n8n")] | first | .node.id // empty')
          [ -n "$N8N_SVC_ID" ] || { echo "::error::N8N service not found in Railway project"; exit 1; }

          DOMAINS_RESP=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --arg sid "$N8N_SVC_ID" --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              '{"query":"query($sid:String!,$eid:String!){serviceInstance(serviceId:$sid,environmentId:$eid){domains{serviceDomains{id domain}}}}","variables":{"sid":$sid,"eid":$eid}}')")

          N8N_DOMAIN=$(echo "$DOMAINS_RESP" | jq -r \
            '(.data.serviceInstance.domains.serviceDomains // []) | .[0].domain // empty')
          [ -n "$N8N_DOMAIN" ] || { echo "::error::N8N Railway service domain not found"; exit 1; }

          echo "N8N domain: $N8N_DOMAIN"
          echo "n8n_domain=$N8N_DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Wait for N8N to be healthy
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
        run: |
          CHECK_URL="https://$N8N_DOMAIN/healthz/readiness"
          for attempt in $(seq 1 10); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$CHECK_URL" 2>/dev/null)
            echo "Attempt $attempt/10: HTTP $HTTP"
            [ "$HTTP" = "200" ] && { echo "N8N is healthy."; break; }
            [ "$attempt" = "10" ] && { echo "::error::N8N health check failed after 10 attempts"; exit 1; }
            sleep 15
          done

      - name: Login to N8N + create CI API key
        id: n8n_auth
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          N8N_OWNER_PASSWORD: ${{ steps.secrets.outputs.n8n-admin-password-plaintext }}
        run: |
          BASE_URL="https://$N8N_DOMAIN"

          LOGIN_RESP=$(curl -s -c /tmp/n8n_cookies.txt \
            -X POST "$BASE_URL/rest/login" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg email "$N8N_OWNER_EMAIL" \
              --arg pw "$N8N_OWNER_PASSWORD" \
              '{"emailOrLdapLoginId":$email,"password":$pw}')")

          USER_ID=$(echo "$LOGIN_RESP" | jq -r '.data.id // empty')
          [ -n "$USER_ID" ] || { echo "::error::N8N login failed: $(echo "$LOGIN_RESP" | jq -r '.code // .message // .')"; exit 1; }
          echo "Logged in as user $USER_ID"

          EXPIRES=$(( $(date +%s) * 1000 + 3600000 ))
          APIKEY_RESP=$(curl -s -b /tmp/n8n_cookies.txt \
            -X POST "$BASE_URL/rest/api-keys" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --argjson exp "$EXPIRES" \
              '{"label":"stage6-broker-ci","scopes":["credential:create","credential:list","workflow:create","workflow:list","workflow:update","variable:create","variable:list","variable:update"],"expiresAt":$exp}')")

          N8N_API_KEY=$(echo "$APIKEY_RESP" | jq -r '.data.rawApiKey // empty')
          N8N_API_KEY_ID=$(echo "$APIKEY_RESP" | jq -r '.data.id // empty')
          [ -n "$N8N_API_KEY" ] || { echo "::error::Failed to create N8N API key: $APIKEY_RESP"; exit 1; }

          echo "::add-mask::$N8N_API_KEY"
          echo "n8n_api_key=$N8N_API_KEY" >> "$GITHUB_OUTPUT"
          echo "n8n_api_key_id=$N8N_API_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "N8N CI API key created (id: $N8N_API_KEY_ID)."

      - name: Upsert Secrets Broker auth credential in N8N (idempotent)
        id: credential
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
          N8N_API_KEY: ${{ steps.n8n_auth.outputs.n8n_api_key }}
          N8N_SECRETS_BROKER_TOKEN: ${{ steps.secrets.outputs.n8n-secrets-broker-token }}
        run: |
          CREDS=$(curl -s -H "X-N8N-API-KEY: $N8N_API_KEY" "$BASE_URL/api/v1/credentials?limit=100")
          CRED_ID=$(echo "$CREDS" | jq -r \
            '[(.data // [])[] | select(.name == "Secrets Broker Auth")] | first | .id // empty')

          CRED_PAYLOAD=$(jq -cn --arg token "$N8N_SECRETS_BROKER_TOKEN" \
            '{"name":"Secrets Broker Auth","type":"httpHeaderAuth","data":{"name":"Authorization","value":("Bearer " + $token)}}')

          if [ -n "$CRED_ID" ]; then
            echo "Updating Secrets Broker Auth credential ($CRED_ID)..."
            curl -s -H "X-N8N-API-KEY: $N8N_API_KEY" \
              -X PATCH "$BASE_URL/api/v1/credentials/$CRED_ID" \
              -H "Content-Type: application/json" \
              -d "$CRED_PAYLOAD" > /dev/null
          else
            echo "Creating Secrets Broker Auth credential..."
            CREATE=$(curl -s -H "X-N8N-API-KEY: $N8N_API_KEY" \
              -X POST "$BASE_URL/api/v1/credentials" \
              -H "Content-Type: application/json" \
              -d "$CRED_PAYLOAD")
            CRED_ID=$(echo "$CREATE" | jq -r '.data.id // .id // empty')
            [ -n "$CRED_ID" ] || { echo "::error::Credential creation failed: $CREATE"; exit 1; }
            echo "Created credential: $CRED_ID"
          fi

          echo "credential_id=$CRED_ID" >> "$GITHUB_OUTPUT"

      - name: Create or update Secrets Broker workflow in N8N (idempotent)
        id: workflow
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
          N8N_API_KEY: ${{ steps.n8n_auth.outputs.n8n_api_key }}
          CRED_ID: ${{ steps.credential.outputs.credential_id }}
          GH_PROVISIONER_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          WORKFLOWS=$(curl -s -H "X-N8N-API-KEY: $N8N_API_KEY" "$BASE_URL/api/v1/workflows?limit=100")
          WF_ID=$(echo "$WORKFLOWS" | jq -r \
            '[(.data // [])[] | select(.name == "Secrets Broker")] | first | .id // empty')

          WF_JSON=$(jq -cn --arg cred_id "$CRED_ID" --arg pat_actions "$GH_PROVISIONER_TOKEN" --arg pat_sync "$GH_PROVISIONER_TOKEN" '{
            "name": "Secrets Broker",
            "nodes": [
              {
                "id": "webhook-broker",
                "name": "Broker Webhook",
                "type": "n8n-nodes-base.webhook",
                "typeVersion": 1,
                "position": [250, 300],
                "parameters": {
                  "httpMethod": "POST",
                  "path": "secrets-broker",
                  "responseMode": "responseNode",
                  "authentication": "headerAuth",
                  "options": {}
                },
                "credentials": {
                  "httpHeaderAuth": {
                    "id": $cred_id,
                    "name": "Secrets Broker Auth"
                  }
                }
              },
              {
                "id": "code-broker",
                "name": "Return Secret Value",
                "type": "n8n-nodes-base.code",
                "typeVersion": 2,
                "position": [500, 300],
                "parameters": {
                  "jsCode": ("const SECRETS = " + ({GITHUB_PAT_ACTIONS_WRITE: $pat_actions, GITHUB_PAT_SKILL_SYNC: $pat_sync} | tostring) + ";\nconst body = $input.first().json.body;\nconst secretName = body?.secret_name;\nif (!secretName) return [{json: {error: \"secret_name is required\"}}];\nconst allowed = Object.keys(SECRETS);\nif (!allowed.includes(secretName)) return [{json: {error: \"Unknown secret: \" + secretName}}];\nconst value = SECRETS[secretName];\nreturn [{json: value ? {value} : {error: \"Variable not set: \" + secretName}}];")
                }
              },
              {
                "id": "respond-broker",
                "name": "Respond to Caller",
                "type": "n8n-nodes-base.respondToWebhook",
                "typeVersion": 1,
                "position": [750, 300],
                "parameters": {
                  "respondWith": "firstIncomingItem"
                }
              }
            ],
            "connections": {
              "Broker Webhook": {
                "main": [[{"node": "Return Secret Value", "type": "main", "index": 0}]]
              },
              "Return Secret Value": {
                "main": [[{"node": "Respond to Caller", "type": "main", "index": 0}]]
              }
            },
            "settings": {"executionOrder": "v1"}
          }')

          if [ -n "$WF_ID" ]; then
            echo "Updating Secrets Broker workflow ($WF_ID)..."
            curl -s \
              -H "X-N8N-API-KEY: $N8N_API_KEY" \
              -X PUT "$BASE_URL/api/v1/workflows/$WF_ID" \
              -H "Content-Type: application/json" \
              -d "$WF_JSON" > /dev/null
          else
            echo "Creating Secrets Broker workflow..."
            CREATE=$(curl -s \
              -H "X-N8N-API-KEY: $N8N_API_KEY" \
              -X POST "$BASE_URL/api/v1/workflows" \
              -H "Content-Type: application/json" \
              -d "$WF_JSON")
            WF_ID=$(echo "$CREATE" | jq -r '.data.id // .id // empty')
            [ -n "$WF_ID" ] || { echo "::error::Workflow creation failed: $CREATE"; exit 1; }
            echo "Created workflow: $WF_ID"
          fi

          echo "workflow_id=$WF_ID" >> "$GITHUB_OUTPUT"

      - name: Activate Secrets Broker workflow
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
          WF_ID: ${{ steps.workflow.outputs.workflow_id }}
        run: |
          WF_RESP=$(curl -s -b /tmp/n8n_cookies.txt "$BASE_URL/rest/workflows/$WF_ID")
          ACTIVE=$(echo "$WF_RESP" | jq -r '.data.active // "false"')
          VERSION_ID=$(echo "$WF_RESP" | jq -r '.data.versionId // empty')
          [ -n "$VERSION_ID" ] || { echo "::error::versionId missing in REST response: $WF_RESP"; exit 1; }

          if [ "$ACTIVE" = "true" ]; then
            echo "Secrets Broker workflow already active — re-activating to pick up variable changes..."
            curl -s -b /tmp/n8n_cookies.txt \
              -X POST "$BASE_URL/rest/workflows/$WF_ID/deactivate" > /dev/null
          fi

          ACTIVATE=$(curl -s -b /tmp/n8n_cookies.txt \
            -X POST "$BASE_URL/rest/workflows/$WF_ID/activate" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --arg vid "$VERSION_ID" '{"versionId":$vid}')")
          ACTIVATED=$(echo "$ACTIVATE" | jq -r '.data.active // "false"')
          [ "$ACTIVATED" = "true" ] || { echo "::error::Failed to activate Secrets Broker: $ACTIVATE"; exit 1; }
          echo "Secrets Broker workflow activated."

      - name: E2E — POST to /webhook/secrets-broker → verify non-empty value
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          N8N_SECRETS_BROKER_TOKEN: ${{ steps.secrets.outputs.n8n-secrets-broker-token }}
        run: |
          echo "N8N domain: $N8N_DOMAIN"
          HTTP_CODE="000"
          CURL_EXIT=1
          for attempt in $(seq 1 10); do
            HTTP_CODE=$(curl -s -o /tmp/broker_resp.txt -w "%{http_code}" --max-time 10 \
              -X POST "https://$N8N_DOMAIN/webhook/secrets-broker" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $N8N_SECRETS_BROKER_TOKEN" \
              -d '{"secret_name":"GITHUB_PAT_ACTIONS_WRITE"}') || true  # key name kept for broker E2E compat
            CURL_EXIT=$?
            [ "$HTTP_CODE" = "200" ] && break
            echo "Attempt $attempt/10: HTTP $HTTP_CODE — waiting..."
            sleep $((attempt < 5 ? 2 : 5))
          done
          RESP=$(cat /tmp/broker_resp.txt 2>/dev/null || echo "")
          echo "curl exit code: $CURL_EXIT"
          echo "HTTP status: $HTTP_CODE"
          echo "Raw response (first 500 chars): ${RESP:0:500}"

          VALUE=$(echo "$RESP" | jq -r '.value // empty' 2>/dev/null || echo "")
          [ -n "$VALUE" ] || { echo "::error::Broker returned empty value. HTTP=$HTTP_CODE curl_exit=$CURL_EXIT"; exit 1; }
          echo "E2E PASSED — Secrets Broker returned non-empty value for GITHUB_PAT_ACTIONS_WRITE (provisioner token)."

      - name: Revoke CI API key
        if: always()
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
          KEY_ID: ${{ steps.n8n_auth.outputs.n8n_api_key_id }}
        run: |
          [ -z "$KEY_ID" ] && { echo "No API key ID captured — skipping revocation."; exit 0; }
          curl -s -b /tmp/n8n_cookies.txt \
            -X DELETE "$BASE_URL/rest/api-keys/$KEY_ID" > /dev/null
          echo "CI API key $KEY_ID revoked."

      - name: Summary
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          WF_ID: ${{ steps.workflow.outputs.workflow_id }}
          CRED_ID: ${{ steps.credential.outputs.credential_id }}
        run: |
          {
            echo "## Stage 6 — N8N Secrets Broker Complete"
            echo ""
            echo "| Resource | Detail | Status |"
            echo "|----------|--------|--------|"
            echo "| N8N credential | \`Secrets Broker Auth\` (httpHeaderAuth, ID: \`$CRED_ID\`) | ✅ |"
            echo "| N8N workflow | \`Secrets Broker\` (ID: \`$WF_ID\`) | ✅ Active |"
            echo "| Broker URL | \`https://$N8N_DOMAIN/webhook/secrets-broker\` | ✅ |"
            echo "| E2E gate | POST → GITHUB_PAT_ACTIONS_WRITE (provisioner token) returned | ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"
