name: Stage 4 — Configure OpenRouter in N8N

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  configure:
    name: Configure OpenRouter credential + test workflow in N8N
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      N8N_OWNER_EMAIL: ${{ vars.N8N_OWNER_EMAIL || 'ops@example.com' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets from GCP Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            railway-api-token:${{ vars.GCP_PROJECT_ID }}/railway-api-token
            railway-project-id:${{ vars.GCP_PROJECT_ID }}/railway-project-id
            railway-environment-id:${{ vars.GCP_PROJECT_ID }}/railway-environment-id
            openrouter-runtime-key:${{ vars.GCP_PROJECT_ID }}/openrouter-runtime-key
            n8n-admin-password-plaintext:${{ vars.GCP_PROJECT_ID }}/n8n-admin-password-plaintext
      - name: Export Railway project/environment IDs to env
        run: |
          echo "RAILWAY_PROJECT_ID=${{ steps.secrets.outputs.railway-project-id }}" >> "$GITHUB_ENV"
          echo "RAILWAY_ENVIRONMENT_ID=${{ steps.secrets.outputs.railway-environment-id }}" >> "$GITHUB_ENV"

      - name: Resolve N8N Railway service domain + service ID
        id: domain
        env:
          RAILWAY_TOKEN: ${{ steps.secrets.outputs.railway-api-token }}
        run: |
          RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --arg pid "$RAILWAY_PROJECT_ID" \
              '{"query":"query($pid:String!){project(id:$pid){services{edges{node{id name}}}}}","variables":{"pid":$pid}}')")

          N8N_SVC_ID=$(echo "$RESP" | jq -r \
            '[.data.project.services.edges[] | select(.node.name == "n8n")] | first | .node.id // empty')
          [ -n "$N8N_SVC_ID" ] || { echo "::error::N8N service not found in Railway project"; exit 1; }

          DOMAINS_RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --arg sid "$N8N_SVC_ID" --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              '{"query":"query($sid:String!,$eid:String!){serviceInstance(serviceId:$sid,environmentId:$eid){domains{serviceDomains{id domain}}}}","variables":{"sid":$sid,"eid":$eid}}')")

          N8N_DOMAIN=$(echo "$DOMAINS_RESP" | jq -r \
            '(.data.serviceInstance.domains.serviceDomains // []) | .[0].domain // empty')
          [ -n "$N8N_DOMAIN" ] || { echo "::error::N8N Railway service domain not found"; exit 1; }

          echo "N8N domain: $N8N_DOMAIN"
          echo "n8n_domain=$N8N_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "n8n_svc_id=$N8N_SVC_ID" >> "$GITHUB_OUTPUT"

      - name: Mask N8N owner password
        id: n8n_pw
        env:
          N8N_PW: ${{ steps.secrets.outputs.n8n-admin-password-plaintext }}
        run: |
          echo "::add-mask::$N8N_PW"
          echo "n8n_pw=$N8N_PW" >> "$GITHUB_OUTPUT"
          echo "N8N owner password resolved from GCP Secret Manager."

      - name: Wait for N8N to be healthy
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
        run: |
          CHECK_URL="https://$N8N_DOMAIN/healthz"
          echo "Health check: $CHECK_URL"
          for attempt in $(seq 1 10); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$CHECK_URL" 2>/dev/null)
            echo "Attempt $attempt/10: HTTP $HTTP"
            [ "$HTTP" = "200" ] && { echo "N8N is healthy."; break; }
            [ "$attempt" = "10" ] && { echo "::error::N8N health check failed after 10 attempts"; exit 1; }
            sleep 15
          done

      - name: Ensure N8N owner configured (wizard API if needed)
        # Defensive guard: Stage 4 may run standalone without setup-n8n-owner.yml having
        # been run first. Idempotent — skips wizard if login already works.
        id: ensure_owner
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          N8N_PW: ${{ steps.n8n_pw.outputs.n8n_pw }}
        run: |
          BASE_URL="https://$N8N_DOMAIN"
          LOGIN_RESP=$(curl -s -c /tmp/n8n_cookies.txt \
            -X POST "$BASE_URL/rest/login" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn --arg email "$N8N_OWNER_EMAIL" --arg pw "$N8N_PW" \
              '{"emailOrLdapLoginId":$email,"password":$pw}')")
          USER_ID=$(echo "$LOGIN_RESP" | jq -r '.data.id // empty')
          if [ -n "$USER_ID" ]; then
            echo "Owner already configured (user id: $USER_ID) — skipping wizard."
            echo "session_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "Owner not configured — calling POST /rest/owner/setup ..."
            SETUP_RESP=$(curl -s \
              -X POST "$BASE_URL/rest/owner/setup" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn --arg email "$N8N_OWNER_EMAIL" --arg pw "$N8N_PW" \
                '{"email":$email,"firstName":"Instance","lastName":"Owner","password":$pw}')")
            USER_ID=$(echo "$SETUP_RESP" | jq -r '.data.id // empty')
            [ -n "$USER_ID" ] || {
              echo "::error::Setup wizard failed: $(echo "$SETUP_RESP" | jq -c '{code:.code,message:.message}')"
              echo "## ❌ Owner setup failed" >> "$GITHUB_STEP_SUMMARY"
              echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
              echo "$SETUP_RESP" | jq . >> "$GITHUB_STEP_SUMMARY"
              echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            }
            echo "Owner configured via wizard (user id: $USER_ID)."
          fi

      - name: Login to N8N + create API key
        id: n8n_auth
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
          N8N_PW: ${{ steps.n8n_pw.outputs.n8n_pw }}
          SESSION_READY: ${{ steps.ensure_owner.outputs.session_ready }}
        run: |
          BASE_URL="https://$N8N_DOMAIN"

          if [ "$SESSION_READY" != "true" ]; then
            LOGIN_RESP=$(curl -s -c /tmp/n8n_cookies.txt \
              -X POST "$BASE_URL/rest/login" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn \
                --arg email "$N8N_OWNER_EMAIL" \
                --arg pw "$N8N_PW" \
                '{"emailOrLdapLoginId":$email,"password":$pw}')")
            USER_ID=$(echo "$LOGIN_RESP" | jq -r '.data.id // empty')
            if [ -z "$USER_ID" ]; then
              ERR=$(echo "$LOGIN_RESP" | jq -r '.code // .message // .')
              echo "::error::N8N login failed (email=$N8N_OWNER_EMAIL): $ERR"
              echo "## ❌ Login failed" >> "$GITHUB_STEP_SUMMARY"
              echo "email: \`$N8N_OWNER_EMAIL\`, error: \`$ERR\`" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            echo "Logged in as user $USER_ID"
          else
            echo "Reusing session from Ensure owner step."
          fi

          # expiresAt is required by n8n (number, ms); use +100 years as "effectively permanent".
          n8n_create_key() {
            local label="$1" exp="$2"
            curl -s -b /tmp/n8n_cookies.txt \
              -X POST "$BASE_URL/rest/api-keys" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn --arg lbl "$label" --argjson exp "$exp" \
                '{"label":$lbl,"scopes":["credential:create","credential:list","workflow:create","workflow:list","workflow:update"],"expiresAt":$exp}')"
          }

          EXPIRES=$(( $(date +%s) * 1000 + 3600000 ))
          APIKEY_RESP=$(n8n_create_key "stage4-ci" "$EXPIRES")
          N8N_API_KEY=$(echo "$APIKEY_RESP" | jq -r '.data.rawApiKey // empty')
          N8N_API_KEY_ID=$(echo "$APIKEY_RESP" | jq -r '.data.id // empty')
          if [ -z "$N8N_API_KEY" ]; then
            echo "::error::Failed to create N8N API key: $APIKEY_RESP"
            echo "## ❌ API key creation failed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
            echo "$APIKEY_RESP" | jq . >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "::add-mask::$N8N_API_KEY"
          echo "n8n_api_key=$N8N_API_KEY" >> "$GITHUB_OUTPUT"
          echo "n8n_api_key_id=$N8N_API_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "N8N API key created (id: $N8N_API_KEY_ID)."

          # Create persistent key in the same session (avoids stale-cookie issues in later steps).
          PKEY_EXPIRES=$(( $(date +%s) * 1000 + 3153600000000 ))
          PKEY_RESP=$(n8n_create_key "automation" "$PKEY_EXPIRES")
          PKEY=$(echo "$PKEY_RESP" | jq -r '.data.rawApiKey // empty')
          if [ -z "$PKEY" ]; then
            echo "::warning::Failed to create persistent N8N API key: $(echo "$PKEY_RESP" | jq -c .)"
            echo "persistent_api_key=" >> "$GITHUB_OUTPUT"
          else
            echo "::add-mask::$PKEY"
            echo "persistent_api_key=$PKEY" >> "$GITHUB_OUTPUT"
            echo "Persistent API key created."
          fi

      - name: Persist N8N API key to GCP Secret Manager (idempotent)
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          PKEY: ${{ steps.n8n_auth.outputs.persistent_api_key }}
        run: |
          if gcloud secrets describe n8n-api-key --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            echo "n8n-api-key already in GCP Secret Manager — skipping."
            echo "| n8n-api-key | ✅ existing |" >> "$GITHUB_STEP_SUMMARY"
          elif [ -z "$PKEY" ]; then
            echo "::warning::Persistent API key was not created in login step — skipping GCP write."
            echo "| n8n-api-key | ⚠ skipped (key not created) |" >> "$GITHUB_STEP_SUMMARY"
          else
            gcloud secrets create n8n-api-key \
              --project="$GCP_PROJECT_ID" --replication-policy=automatic
            printf '%s' "$PKEY" | gcloud secrets versions add n8n-api-key \
              --project="$GCP_PROJECT_ID" --data-file=-
            echo "n8n-api-key stored in GCP Secret Manager."
            echo "| n8n-api-key | ✅ created |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create OpenRouter credential in N8N (idempotent)
        id: credential
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
          N8N_API_KEY: ${{ steps.n8n_auth.outputs.n8n_api_key }}
          OPENROUTER_RUNTIME_KEY: ${{ steps.secrets.outputs.openrouter-runtime-key }}
        run: |
          CREDS=$(curl -s -H "X-N8N-API-KEY: $N8N_API_KEY" "$BASE_URL/api/v1/credentials?limit=100")
          CRED_ID=$(echo "$CREDS" | jq -r \
            '[(.data // [])[] | select(.name == "OpenRouter")] | first | .id // empty')

          if [ -n "$CRED_ID" ]; then
            echo "OpenRouter credential already exists: $CRED_ID"
          else
            echo "Creating OpenRouter credential..."
            CREATE=$(curl -s \
              -H "X-N8N-API-KEY: $N8N_API_KEY" \
              -X POST "$BASE_URL/api/v1/credentials" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn \
                --arg key "$OPENROUTER_RUNTIME_KEY" \
                '{"name":"OpenRouter","type":"httpHeaderAuth","data":{"name":"Authorization","value":("Bearer " + $key)}}')") 
            CRED_ID=$(echo "$CREATE" | jq -r '.data.id // .id // empty')
            [ -n "$CRED_ID" ] || { echo "::error::Credential creation failed: $CREATE"; exit 1; }
            echo "Created credential: $CRED_ID"
          fi

          echo "credential_id=$CRED_ID" >> "$GITHUB_OUTPUT"

      - name: Create OpenRouter test workflow in N8N (idempotent)
        id: workflow
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
          N8N_API_KEY: ${{ steps.n8n_auth.outputs.n8n_api_key }}
          CRED_ID: ${{ steps.credential.outputs.credential_id }}
        run: |
          WORKFLOWS=$(curl -s -H "X-N8N-API-KEY: $N8N_API_KEY" "$BASE_URL/api/v1/workflows?limit=100")
          WF_ID=$(echo "$WORKFLOWS" | jq -r \
            '[(.data // [])[] | select(.name == "OpenRouter Test")] | first | .id // empty')

          if [ -n "$WF_ID" ]; then
            echo "OpenRouter Test workflow already exists: $WF_ID"
          else
            echo "Creating OpenRouter Test workflow..."
            WF_JSON=$(jq -cn --arg cred_id "$CRED_ID" '{
              "name": "OpenRouter Test",
              "nodes": [
                {
                  "id": "webhook-1",
                  "name": "Webhook",
                  "type": "n8n-nodes-base.webhook",
                  "typeVersion": 2,
                  "position": [250, 300],
                  "parameters": {
                    "httpMethod": "POST",
                    "path": "test-ai",
                    "responseMode": "responseNode",
                    "options": {}
                  }
                },
                {
                  "id": "http-1",
                  "name": "Call OpenRouter",
                  "type": "n8n-nodes-base.httpRequest",
                  "typeVersion": 4,
                  "position": [500, 300],
                  "parameters": {
                    "method": "POST",
                    "url": "https://openrouter.ai/api/v1/chat/completions",
                    "authentication": "predefinedCredentialType",
                    "nodeCredentialType": "httpHeaderAuth",
                    "sendBody": true,
                    "specifyBody": "json",
                    "jsonBody": "={{ JSON.stringify({\"model\":\"openai/gpt-4o-mini\",\"messages\":[{\"role\":\"user\",\"content\":$input.first().json.body.prompt || \"Say hello in one Hebrew sentence.\"}]}) }}"
                  },
                  "credentials": {
                    "httpHeaderAuth": {
                      "id": $cred_id,
                      "name": "OpenRouter"
                    }
                  }
                },
                {
                  "id": "respond-1",
                  "name": "Respond to Webhook",
                  "type": "n8n-nodes-base.respondToWebhook",
                  "typeVersion": 1,
                  "position": [750, 300],
                  "parameters": {
                    "respondWith": "json",
                    "responseBody": "={{ {\"response\": $json.choices[0].message.content} }}"
                  }
                }
              ],
              "connections": {
                "Webhook": {
                  "main": [[{"node": "Call OpenRouter", "type": "main", "index": 0}]]
                },
                "Call OpenRouter": {
                  "main": [[{"node": "Respond to Webhook", "type": "main", "index": 0}]]
                }
              },
              "settings": {"executionOrder": "v1"}
            }')

            CREATE=$(curl -s \
              -H "X-N8N-API-KEY: $N8N_API_KEY" \
              -X POST "$BASE_URL/api/v1/workflows" \
              -H "Content-Type: application/json" \
              -d "$WF_JSON")
            WF_ID=$(echo "$CREATE" | jq -r '.data.id // .id // empty')
            [ -n "$WF_ID" ] || { echo "::error::Workflow creation failed: $CREATE"; exit 1; }
            echo "Created workflow: $WF_ID"
          fi

          echo "workflow_id=$WF_ID" >> "$GITHUB_OUTPUT"

      - name: Activate OpenRouter Test workflow
        id: activate
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
          N8N_API_KEY: ${{ steps.n8n_auth.outputs.n8n_api_key }}
          WF_ID: ${{ steps.workflow.outputs.workflow_id }}
        run: |
          WF_RESP=$(curl -s -b /tmp/n8n_cookies.txt "$BASE_URL/rest/workflows/$WF_ID")
          ACTIVE=$(echo "$WF_RESP" | jq -r '.data.active // "false"')

          if [ "$ACTIVE" = "true" ]; then
            echo "Workflow already active — skipping."
          else
            VERSION_ID=$(echo "$WF_RESP" | jq -r '.data.versionId // empty')
            [ -n "$VERSION_ID" ] || { echo "::error::versionId missing in REST response: $WF_RESP"; exit 1; }
            echo "Activating workflow $WF_ID (versionId: $VERSION_ID)..."
            ACTIVATE=$(curl -s -b /tmp/n8n_cookies.txt \
              -X POST "$BASE_URL/rest/workflows/$WF_ID/activate" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn --arg vid "$VERSION_ID" '{"versionId":$vid}')")
            ACTIVATED=$(echo "$ACTIVATE" | jq -r '.data.active // "false"')
            [ "$ACTIVATED" = "true" ] || { echo "::error::Failed to activate workflow: $ACTIVATE"; exit 1; }
            echo "Workflow activated."
          fi

      - name: E2E — POST /webhook/test-ai → AI response
        env:
          N8N_DOMAIN: ${{ steps.domain.outputs.n8n_domain }}
        run: |
          echo "Running E2E: POST /webhook/test-ai..."
          RESPONSE=$(curl -s --max-time 45 \
            -X POST "https://$N8N_DOMAIN/webhook/test-ai" \
            -H "Content-Type: application/json" \
            -d '{"prompt":"אמור שלום במשפט אחד"}')

          echo "Raw response: $RESPONSE"
          CONTENT=$(echo "$RESPONSE" | jq -r '.response // empty' 2>/dev/null)
          [ -n "$CONTENT" ] || { echo "::error::No response content from OpenRouter. Full response: $RESPONSE"; exit 1; }

          echo "E2E PASSED — AI responded."
          echo "Response length: ${#CONTENT} characters"

      - name: Revoke CI API key
        if: always()
        env:
          BASE_URL: ${{ steps.n8n_auth.outputs.base_url }}
          KEY_ID: ${{ steps.n8n_auth.outputs.n8n_api_key_id }}
        run: |
          [ -z "$KEY_ID" ] && { echo "No API key ID captured — skipping revocation."; exit 0; }
          curl -s -b /tmp/n8n_cookies.txt \
            -X DELETE "$BASE_URL/rest/api-keys/$KEY_ID" > /dev/null
          echo "CI API key $KEY_ID revoked."

      - name: Summary
        env:
          CRED_ID: ${{ steps.credential.outputs.credential_id }}
          WF_ID: ${{ steps.workflow.outputs.workflow_id }}
        run: |
          {
            echo "## Stage 4 — OpenRouter Integration Complete"
            echo ""
            echo "| Resource | Detail | Status |"
            echo "|----------|--------|--------|"
            echo "| N8N credential | \`OpenRouter\` (httpHeaderAuth, ID: \`$CRED_ID\`) | ✅ |"
            echo "| N8N workflow | \`OpenRouter Test\` (ID: \`$WF_ID\`) | ✅ Active |"
            echo "| E2E gate | \`POST /webhook/test-ai\` → AI response | ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"
