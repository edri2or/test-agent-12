name: Doc Lint

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.lycheeignore'
      - '.github/workflows/doc-lint.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/agent/tests/markdown-invariants.test.ts'
      - 'specs/**'
      - 'schemas/**'
  schedule:
    # Weekly external-link health check, Monday 06:00 UTC.
    # Result goes to the Actions tab, never blocks PRs.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            !node_modules
            !FINAL_SYNTHESIS_HANDOFF.md.md

  link-check-internal:
    name: Internal links (lychee --offline)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            --exclude-path node_modules
            --exclude-path FINAL_SYNTHESIS_HANDOFF.md.md
            './**/*.md'
          fail: true

  link-check-external:
    name: External links (lychee, scheduled-only)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path node_modules
            --exclude-path FINAL_SYNTHESIS_HANDOFF.md.md
            './**/*.md'
          fail: false
      - name: Surface results to step summary
        if: always()
        run: |
          echo "External link check completed at $(date -u). See lychee output above." \
            >> "$GITHUB_STEP_SUMMARY"

  invariants:
    name: Markdown invariants (Jest)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --silent
      - run: npm run test:docs --silent
